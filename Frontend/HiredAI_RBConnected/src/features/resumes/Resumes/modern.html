<!DOCTYPE html>
<html>
<head>
<title>Resume</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    color: #000;
    line-height: 1.7;
}

/* Force real resume size */
.resume {
    width: 794px;
    min-height: 1123px;
    padding: 40px;
    box-sizing: border-box;
    background: white;
}

/* Force readable text size */
.resume p {
    font-size: 20px;
     font-weight: 500;
}
.resume div {
    font-size: 20px;
}
.resume {
    max-width: 800px;
    margin: auto;
}

.block {
    border: 1px solid black;
    padding: 15px;
    margin-bottom: 20px;
}

h1 {
     font-weight: 500;
     font-size: 30px;
    text-align: center;
}

h2 {
    margin-top: 0;
    font-weight: 530;
}
</style>

</head>

<body>

<div class="resume">

<h1>{{FULL_NAME}}</h1>

<p style="text-align:center;">
Email:{{EMAIL}} Phone: {{PHONE}} Location: {{LOCATION}}
</p>

<div class="block">
<h2>Profile Summary</h2>
<p>{{SUMMARY}}</p>
</div>

<div class="block">
<h2>Education</h2>
<p>{{EDUCATION}}</p>
</div>

<div class="block">
<h2>Skills</h2>
<p>{{SKILLS}}</p>
</div>

<div class="block">
<h2>Projects</h2>
<p>{{PROJECTS}}</p>
</div>

<div class="block">
<h2>Certifications</h2>
<p>{{CERTIFICATIONS}}</p>
</div>

</div>

</body>
</html>
