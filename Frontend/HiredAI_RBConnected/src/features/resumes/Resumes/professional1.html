<!DOCTYPE html>
<html>
<head>
<title>One Page Resume</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    color: #000;
    line-height: 1.7;
}

/* Force real resume size */
.resume {
    width: 794px;
    min-height: 1123px;
    padding: 40px;
    box-sizing: border-box;
    background: white;
}

/* Force readable text size */
.resume p,
.resume div {
    font-size: 25px;
}

.page {
    border: 2px solid black;
    padding: 25px;
    max-width: 800px;
    margin: auto;
    min-height: 1050px; /* A4 size approx */
    box-sizing: border-box;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 15px;
    font-size: 17PX;
}

h1 {
    margin: 5px 0;
    font-size: 30PX;
}


h2 {
    border-bottom: 1px solid black;
    font-size: 20px;
    padding-bottom: 3px;
    
}
</style>
</head>

<body>

<div class="page">

<div class="header">
<h1>{{FULL_NAME}}</h1>
<p>Email:{{EMAIL}} | Phone: {{PHONE}} | Location: {{LOCATION}}</p>
</div>

<div class="section">
<h2>Summary</h2>
<p>{{SUMMARY}}</p>
</div>

<div class="section">
<h2>Education</h2>
<p>{{EDUCATION}}</p>
</div>

<div class="section">
<h2>Skills</h2>
<p>{{SKILLS}}</p>
</div>

<div class="section">
<h2>Projects</h2>
<p>{{PROJECTS}}</p>
</div>

<div class="section">
<h2>Internship</h2>
<p>{{INTERNSHIP}}</p>
</div>

<div class="section">
<h2>Certifications</h2>
<p>{{CERTIFICATIONS}}</p>
</div>

<div class="section">
<h2>Declaration</h2>
<p>{{DECLARATION}}</p>

</body>
</html>
