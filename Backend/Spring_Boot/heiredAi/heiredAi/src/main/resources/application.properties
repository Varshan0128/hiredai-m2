spring.application.name=heiredAi
spring.config.import=optional:file:.env[.properties],optional:file:../../../../.env[.properties]

# ===============================
# DATABASE (Render + Supabase)
# ===============================
spring.datasource.url=${HEIREDAI_JDBC_URL:${SPRING_DATASOURCE_URL}}
spring.datasource.username=${HEIREDAI_JDBC_USERNAME:${SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${HEIREDAI_JDBC_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:${HEIREDAI_PORT}}

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.localhost=${MAIL_SMTP_LOCALHOST:localhost}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:10000}

# ===============================
# GOOGLE OAUTH
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===============================
# GITHUB OAUTH
# ===============================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8082/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-name=GitHub

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=login

# ===============================
# LINKEDIN OAUTH (OIDC)
# ===============================
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET}
spring.security.oauth2.client.registration.linkedin.scope=r_liteprofile,r_emailaddress
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/me
spring.security.oauth2.client.provider.linkedin.user-name-attribute=id
spring.security.oauth2.client.registration.linkedin.redirect-uri=${VITE_HEIREDAI_API_URL}/login/oauth2/code/linkedin

# ===============================
# FRONTEND + CORS + AUTH
# ===============================
app.frontend.url=${VITE_FRONTEND_URL}
app.frontend.oauth2-success-url=${FRONTEND_OAUTH2_SUCCESS_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${VITE_FRONTEND_URL:http://localhost:3000}}

app.auth.cookie.name=${AUTH_COOKIE_NAME}
app.auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE}

# ===============================
# LOGGING
# ===============================
debug=true
logging.level.root=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# ===============================
# ERROR DETAILS (TEMP DEBUG)
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true
