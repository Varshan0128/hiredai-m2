# ==============================
# APPLICATION
# ==============================
spring.application.name=ResumeBuilder
spring.config.import=optional:file:.env[.properties],optional:file:../../../../.env[.properties]
server.port=8090

# ==============================
# DATASOURCE
# ==============================
spring.datasource.url=${RESUME_BUILDER_JDBC_URL}
spring.datasource.username=${RESUME_BUILDER_JDBC_USERNAME}
spring.datasource.password=${RESUME_BUILDER_JDBC_PASSWORD}

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${RESUME_BUILDER_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# ==============================
# CONNECTION POOL (OPTIONAL BUT SAFE)
# ==============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
