<!DOCTYPE html>
<html>
<head>
<title>Resume</title>

<style>
body {
    font-family: "Times New Roman", serif;
    margin: 50px;
    color: black;
}

.resume {
    max-width: 800px;
    margin: auto;
}

.block {
    border: 1px solid black;
    padding: 15px;
    margin-bottom: 20px;
}

h1 {
    text-align: center;
}

h2 {
    margin-top: 0;
}
</style>

</head>

<body>

<div class="resume">

<h1>{{YOUR_NAME}}</h1>

<p style="text-align:center;">
Email:{{EMAIL}} Phone: {{PHONE}} Location: {{LOCATION}}
</p>

<div class="block">
<h2>Profile Summary</h2>
<p>{{PROFILE_SUMMARY}}</p>
</div>

<div class="block">
<h2>Education</h2>
<p>{{EDUCATION}}</p>
</div>

<div class="block">
<h2>Skills</h2>
<p>{{SKILLS}}</p>
</div>

<div class="block">
<h2>Projects</h2>
<p>{{PROJECTS}}</p>
</div>

<div class="block">
<h2>Certifications</h2>
<p>{{CERTIFICATIONS}}</p>
</div>

</div>

</body>
</html>
