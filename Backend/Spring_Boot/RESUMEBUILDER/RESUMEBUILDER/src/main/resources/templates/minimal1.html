<!DOCTYPE html>
<html>
<head>
<title>Resume</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    color: #000;
    line-height: 1.6;
}

.resume {
    max-width: 800px;
    margin: auto;
}

.header {
    margin-bottom: 25px;
}

.header h1 {
    font-size: 24px;
    margin: 0;
}

.header p {
    font-size: 14px;
    margin-top: 6px;
}

.section {
    margin-bottom: 22px;
}

.section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
}
</style>

</head>

<body>

<div class="resume">

<!-- Header -->
<div class="header">
<h1>{{FULL_NAME}}</h1>
<p>{{EMAIL}} | {{PHONE}} | {{LOCATION}}</p>
</div>

<!-- Summary -->
<div class="section">
<div class="section-title">Summary</div>
<p>{{SUMMARY}}</p>
</div>

<!-- Education -->
<div class="section">
<div class="section-title">Education</div>
<p>{{EDUCATION}}</p>
</div>

<!-- Skills -->
<div class="section">
<div class="section-title">Skills</div>
<p>{{SKILLS}}</p>
</div>

<!-- Experience -->
<div class="section">
<div class="section-title">Experience</div>
<p>{{EXPERIENCE}}</p>
</div>

<!-- Projects -->
<div class="section">
<div class="section-title">Projects</div>
<p>{{PROJECTS}}</p>
</div>

<!-- Certifications -->
<div class="section">
<div class="section-title">Certifications</div>
<p>{{CERTIFICATIONS}}</p>
</div>

</div>

</body>
</html>
