<!DOCTYPE html>
<html>
<head>
<title>One Page Resume</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    color: black;
}

.page {
    max-width: 800px;
    min-height: 1050px;
    margin: auto;
    border: 2px solid black;
    border-left: 6px solid black;
    padding: 25px;
    box-sizing: border-box;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 14px;
}

h2 {
    font-size: 15px;
    border-bottom: 1px solid black;
}
</style>
</head>

<body>

<div class="page">

<div class="header">
<h1>{{FULL_NAME}}</h1>
<p>{{MAIL}} | {{PHONE}} | {{LOCATION}} </p>
</div>

<div class="section">
<h2>Profile</h2>
<p>{{PROFILE}}</p>
</div>

<div class="section">
<h2>Education</h2>
<p>{{EDUCATION}}</p>
</div>

<div class="section">
<h2>Skills</h2>
<p>{{SKILLS}}</p>
</div>

<div class="section">
<h2>Projects</h2>
<p>{{PROJECTS}}</p>
</div>

<div class="section">
<h2>Internship</h2>
<p>{{INTERNSHIP}}</p>
</div>

<div class="section">
<h2>Certifications</h2>
<p>{{CERTIFICATIONS}}</p>
</div>

</div>

</body>
</html>
